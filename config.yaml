# LangClaw agent configuration (OpenCLaw-compatible style)

agents:
  default:
    model: ollama/llama3.2:3b
    system_prompt: |
      You are a helpful AI assistant. Use the available tools when needed to
      answer questions. Think step by step.
    channels:
      - terminal
      # Enable telegram to run the bot from the same entrypoint (run.py)
      - telegram
      telegram_chat_id: "388662653"
    memory:
      backend: memory
    tools:
      - calculator
      - get_current_time
      - a2a_send
      - read_file
      - write_file
      - shell
      - telegram_send_message
      - send_email
      - calendar_add
      - calendar_list
    skills:
      - example
    rag:
      enabled: true
      sources: [rag_fixtures]
      embedding_model: ollama/nomic-embed-text
      chunk_size: 800
      chunk_overlap: 120
      k: 4
      persist_directory: .rag_index
      include_pdf: false
    max_turns: 50
    temperature: 0.7

    # Named A2A peers (each tool_name must appear in tools: above). Requires: pip install -e ".[a2a]"
    # a2a_peers:
    #   - tool_name: ask_local_a2a
    #     base_url: http://127.0.0.1:9999
    #     # description: optional override; default comes from agent card

    # Auto-inject RAG (requires: pip install -e ".[rag]" and a running embedder, e.g. ollama pull nomic-embed-text)
    # rag:
    #   enabled: true
    #   sources: [rag_fixtures]
    #   embedding_model: ollama/nomic-embed-text
    #   chunk_size: 800
    #   chunk_overlap: 120
    #   k: 4
    #   persist_directory: .rag_index
    #   include_pdf: false

